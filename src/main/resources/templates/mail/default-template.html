<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .header { background-color: #004a99; color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; }
        .footer { background-color: #f9f9f9; color: #777; padding: 20px; text-align: center; font-size: 12px; }
        .button { display: inline-block; padding: 12px 24px; background-color: #004a99; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Aliança Psicossocial</h1>
        </div>
        <div class="content">
            <h2 th:text="'Olá, ' + ${nome} + '!'">Olá, Usuário!</h2>
            <p th:text="${mensagem}">Bem-vindo à nossa plataforma.</p>
            <a th:if="${link}" th:href="${link}" class="button" th:text="${textoBotao}">Clique Aqui</a>
        </div>
        <div class="footer">
            <p>&copy; 2024 Aliança Psicossocial. Todos os direitos reservados.</p>
            <p>Este é um e-mail automático, por favor não responda.</p>
        </div>
    </div>
</body>
</html>
