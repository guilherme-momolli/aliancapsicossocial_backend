# ==========================================
# Configurações do Aplicativo
# ==========================================
spring.application.name=aliancapsicossocial
server.port=${PORT:8080}

# Ativação de perfis do Spring
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ==========================================
# Configurações de Banco de Dados (PostgreSQL)
# ==========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aliancapsicossocial}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# Configurações do Hibernate/JPA
# ==========================================
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=${DB_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${DB_FORMAT_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Configurações de Documentação (Swagger UI)
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operations-sorter=alpha

# ==========================================
# Configurações de Segurança (Spring Security)
# ==========================================
spring.security.user.name=${SPRING_SECURITY_USER_NAME:admin}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:admin}

# ==========================================
# Configurações AWS (S3, SES, Região)
# ==========================================
aws.region=${AWS_REGION:sa-east-1}
aws.s3.bucket=${AWS_S3_BUCKET_NAME:aliancap-uploads-bucket}
aws.ses.from=${AWS_SES_FROM_EMAIL:contato@aliancapsicossocial.com.br}

# Credenciais AWS (Usadas principalmente em Desenvolvimento/LocalStack)
aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}

# Endpoints customizados (Opcional - Usado em Desenvolvimento com LocalStack)
aws.s3.endpoint=${AWS_S3_ENDPOINT:}
aws.ses.endpoint=${AWS_SES_ENDPOINT:}

# ==========================================
# Segurança Adicional e CORS
# ==========================================
api.security.token.secret=${JWT_SECRET:segredo-super-secreto-e-longo-para-desenvolvimento-123456}
api.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
