services:
  # -------------------------------------------------------------
  # BANCO DE DADOS: PostgreSQL
  # -------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aliancap-postgres-dev
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aliancap-network

  # -------------------------------------------------------------
  # INTERFACE DE BANCO DE DADOS: PgAdmin 4
  # -------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8.4
    container_name: aliancap-pgadmin-dev
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - aliancap-network

  # -------------------------------------------------------------
  # BACKEND: Spring Boot API
  # -------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aliancap-api-dev
    restart: always
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - envs/.env.dev
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aliancap-network

volumes:
  postgres_dev_data:
    driver: local

networks:
  aliancap-network:
    driver: bridge
